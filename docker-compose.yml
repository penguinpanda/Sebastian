services:
  migrate:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://sebastian:sebastian@postgres:5432/sebastian
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://sebastian:sebastian@postgres:5432/sebastian
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://sebastian:sebastian@postgres:5432/sebastian
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=INFO

  celery-beat:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://sebastian:sebastian@postgres:5432/sebastian
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      celery-worker:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=INFO

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sebastian
      POSTGRES_PASSWORD: sebastian
      POSTGRES_DB: sebastian
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sebastian -d sebastian"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"

volumes:
  postgres_data:
